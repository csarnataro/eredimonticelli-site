# docker pull devillex/docker-firebase

steps:
- name: 'node:22.20.0'
  entrypoint: 'npm'
  args: ['ci']

- name: 'node:22.20.0'
  entrypoint: 'npm'
  args: ['run', 'create-env']
  env:
    - EMAIL=${_EMAIL}
    - COMMIT_SHA=$COMMIT_SHA

- name: 'node:22.20.0'
  entrypoint: 'npm'
  args: ['run', 'build']
  env:
    - EMAIL=${_EMAIL}
    - COMMIT_SHA=$COMMIT_SHA

- name: us-docker.pkg.dev/firebase-cli/us/firebase
  args: [ 'deploy', '--project=$PROJECT_ID', '--only=hosting']

timeout: "300s"
